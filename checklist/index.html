<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#22c55e" />
  <meta name="description" content="每天要做的事，做了打勾，没做也能一眼看到。" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="完成清单" />
  <title>每日完成清单</title>
  <style>
    :root {
      --bg: #f3f5f7;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #7b8794;
      --accent: #22c55e;
      --accent-soft: #dcfce7;
      --border: #e4e7eb;
      --track: #e4e7eb;
      --warn: #f59e0b;
      --shadow: 0 1px 3px rgba(15, 23, 42, .08), 0 6px 18px rgba(15, 23, 42, .06);
    }
    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #34d399;
      --accent-soft: #14321f;
      --border: #334155;
      --track: #334155;
      --warn: #fbbf24;
      --shadow: 0 1px 3px rgba(0, 0, 0, .4), 0 6px 18px rgba(0, 0, 0, .35);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      transition: background .25s ease, color .25s ease;
    }
    .wrap { max-width: 560px; margin: 0 auto; padding: 16px 16px 40px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
    h1 { font-size: 22px; margin: 0; letter-spacing: .5px; }
    .sub { color: var(--muted); font-size: 13px; margin: 2px 0 14px; }
    .icon-btn {
      border: 1px solid var(--border); background: var(--card); color: var(--text);
      width: 40px; height: 40px; border-radius: 12px; font-size: 18px; cursor: pointer;
      display: grid; place-items: center; flex: none;
    }
    .icon-btn:active { transform: scale(.94); }

    .progress-card {
      background: var(--card); border-radius: 18px; padding: 16px;
      box-shadow: var(--shadow); margin-bottom: 14px;
    }
    .progress-top { display: flex; align-items: baseline; justify-content: space-between; }
    .progress-top .count { font-size: 15px; color: var(--muted); }
    .progress-top .count b { color: var(--text); font-size: 20px; }
    .bar { height: 12px; background: var(--track); border-radius: 99px; overflow: hidden; margin-top: 10px; }
    .bar > i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), #16a34a); border-radius: 99px; transition: width .45s cubic-bezier(.2,.8,.2,1); }
    .streak { margin-top: 12px; font-size: 14px; color: var(--muted); }
    .streak b { color: var(--warn); font-size: 16px; }

    .suggest {
      display: none; align-items: center; gap: 10px;
      background: var(--accent-soft); color: var(--text);
      border: 1px solid var(--accent); border-radius: 14px;
      padding: 12px 14px; margin-bottom: 14px; font-size: 14px;
    }
    .suggest.show { display: flex; }
    .suggest .emo { font-size: 20px; }

    .add {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .add input[type=text] {
      flex: 1 1 160px; min-width: 0; padding: 12px 14px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 15px;
    }
    .add input.cat {
      flex: 1 1 90px;
    }
    .add button {
      flex: none; padding: 12px 18px; border-radius: 12px; border: none;
      background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .add button:active { transform: scale(.96); }

    .group-title {
      font-size: 13px; color: var(--muted); margin: 16px 4px 8px; display: flex; align-items: center; gap: 8px;
    }
    .group-title::before { content: ""; width: 8px; height: 8px; border-radius: 99px; background: var(--accent); }

    ul.list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
    li.item {
      display: flex; align-items: center; gap: 12px; background: var(--card);
      border-radius: 14px; padding: 14px; box-shadow: var(--shadow); cursor: pointer; user-select: none;
      transition: opacity .2s ease, background .2s ease;
    }
    li.item:active { transform: scale(.99); }
    .check {
      width: 26px; height: 26px; border-radius: 8px; border: 2px solid var(--border);
      flex: none; display: grid; place-items: center; transition: all .2s ease; background: transparent;
    }
    .check svg { width: 16px; height: 16px; opacity: 0; transform: scale(.4); transition: all .2s ease; }
    li.done .check { background: var(--accent); border-color: var(--accent); }
    li.done .check svg { opacity: 1; transform: scale(1); }
    .label { flex: 1; min-width: 0; font-size: 16px; word-break: break-word; }
    li.done .label { color: var(--muted); text-decoration: line-through; }
    .tag { font-size: 11px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); padding: 2px 8px; border-radius: 99px; flex: none; }
    .del { border: none; background: transparent; color: var(--muted); font-size: 20px; cursor: pointer; flex: none; width: 30px; height: 30px; border-radius: 8px; }
    .del:active { background: var(--track); color: #ef4444; }

    .empty { text-align: center; color: var(--muted); padding: 30px 10px; font-size: 14px; }

    .history { margin-top: 26px; }
    .history h2 { font-size: 15px; margin: 0 0 10px 4px; }
    .days { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; }
    .day { flex: none; width: 34px; text-align: center; }
    .day .d { font-size: 11px; color: var(--muted); }
    .day .dot { height: 28px; border-radius: 8px; background: var(--track); margin-top: 4px; display: flex; align-items: flex-end; overflow: hidden; }
    .day .dot > i { display: block; width: 100%; background: var(--accent); }
    .day.full .dot { background: var(--accent-soft); }
    .day.none .dot > i { background: #ef4444; }

    .actions { display: flex; gap: 10px; margin-top: 24px; }
    .actions button {
      flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--card); color: var(--text); font-size: 14px; cursor: pointer;
    }
    .actions button.danger { color: #ef4444; }
    .actions button:active { transform: scale(.97); }

    .toast {
      position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: var(--bg); padding: 12px 20px; border-radius: 99px;
      font-size: 14px; opacity: 0; pointer-events: none; transition: all .3s ease; z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>每日完成清单</h1>
      </div>
      <button class="icon-btn" id="themeToggle" title="切换主题">🌙</button>
    </header>
    <div class="sub" id="dateLine">—</div>

    <div class="suggest" id="suggest">
      <span class="emo">💊</span>
      <span id="suggestText"></span>
    </div>

    <div class="progress-card">
      <div class="progress-top">
        <div class="count">今日已完成 <b id="doneCount">0</b> / <span id="totalCount">0</span></div>
        <div class="count" id="pctText">0%</div>
      </div>
      <div class="bar"><i id="barFill"></i></div>
      <div class="streak">连续完成：<b id="streakNum">0</b> 天</div>
    </div>

    <div class="add">
      <input type="text" id="newTask" placeholder="添加要做的事，如：早餐后服药" maxlength="40" />
      <input type="text" id="newCat" class="cat" list="catList" placeholder="分组" maxlength="12" />
      <datalist id="catList"></datalist>
      <button id="addBtn">添加</button>
    </div>

    <div id="groups"></div>

    <div class="history">
      <h2>最近 14 天</h2>
      <div class="days" id="history"></div>
    </div>

    <div class="actions">
      <button id="clearToday">清空今日勾选</button>
      <button id="resetAll" class="danger">重置全部任务</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="./app.js"></script>
</body>
</html>
